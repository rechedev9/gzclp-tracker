name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          no-cache: false

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run format:check

      - run: bun run test

      - run: bun run build
        env:
          # Required for production Vite build validation.
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://gravityroom.app' }}

  deploy:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git pull origin main
            COMMIT_SHA=$(git rev-parse --short HEAD)
            docker compose build --build-arg COMMIT_SHA=$COMMIT_SHA
            docker compose up -d --remove-orphans

            echo "Waiting for containers to start..."
            sleep 5

            # Check API health (port 3002 -> container 3001)
            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1:3002/health > /dev/null 2>&1; then
                echo "API health check passed"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "API health check FAILED after 5 attempts"
                docker compose logs --tail=50 api
                exit 1
              fi
              echo "API not ready, retrying in 5s... (attempt $i/5)"
              sleep 5
            done

            # Check web container (port 8080 -> container 80)
            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1:8080 > /dev/null 2>&1; then
                echo "Web health check passed"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "Web health check FAILED after 5 attempts"
                docker compose logs --tail=50 web
                exit 1
              fi
              echo "Web not ready, retrying in 5s... (attempt $i/5)"
              sleep 5
            done

            echo "Deploy verified successfully"
